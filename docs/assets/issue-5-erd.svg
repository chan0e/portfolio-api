<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1080" viewBox="0 0 1800 1080">
  <defs>
    <style>
      .title { font: 700 28px 'Segoe UI', Arial, sans-serif; fill: #1f2937; }
      .subtitle { font: 500 14px 'Segoe UI', Arial, sans-serif; fill: #4b5563; }
      .table-title { font: 700 16px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .table-col { font: 12px 'Consolas', 'Courier New', monospace; fill: #1f2937; }
      .line { stroke: #475569; stroke-width: 2; fill: none; }
      .card { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 2; rx: 8; ry: 8; }
      .card-head { fill: #e2e8f0; stroke: #cbd5e1; stroke-width: 2; rx: 8; ry: 8; }
      .label { font: 700 12px 'Segoe UI', Arial, sans-serif; fill: #334155; }
      .legend { font: 600 12px 'Segoe UI', Arial, sans-serif; fill: #475569; }
    </style>
  </defs>

  <rect x="0" y="0" width="1800" height="1080" fill="#ffffff"/>
  <text x="40" y="46" class="title">Issue #5 Database ERD</text>
  <text x="40" y="74" class="subtitle">Portfolio API schema (1:1, 1:N relationships, encrypted PII columns applied)</text>

  <text x="40" y="110" class="legend">Legend: 1 = one, N = many, PII encrypted columns = *_enc/*_iv/*_tag/*_key_version</text>

  <!-- portfolio -->
  <g transform="translate(760,120)">
    <rect class="card-head" x="0" y="0" width="280" height="34"/>
    <rect class="card" x="0" y="34" width="280" height="126"/>
    <text x="14" y="22" class="table-title">portfolio</text>
    <text x="14" y="56" class="table-col">PK id</text>
    <text x="14" y="76" class="table-col">UQ portfolio_key</text>
    <text x="14" y="96" class="table-col">source</text>
    <text x="14" y="116" class="table-col">synced_at</text>
    <text x="14" y="136" class="table-col">created_at, updated_at</text>
  </g>

  <!-- profile -->
  <g transform="translate(340,320)">
    <rect class="card-head" x="0" y="0" width="320" height="34"/>
    <rect class="card" x="0" y="34" width="320" height="170"/>
    <text x="14" y="22" class="table-title">profile</text>
    <text x="14" y="56" class="table-col">PK id, FK/UQ portfolio_id</text>
    <text x="14" y="76" class="table-col">name_enc/name_iv/name_tag</text>
    <text x="14" y="96" class="table-col">name_key_version</text>
    <text x="14" y="116" class="table-col">role, headline, summary</text>
    <text x="14" y="136" class="table-col">location_enc/location_iv/location_tag</text>
    <text x="14" y="156" class="table-col">photo_src, photo_alt</text>
    <text x="14" y="176" class="table-col">created_at, updated_at</text>
  </g>

  <!-- profile_bio -->
  <g transform="translate(80,600)">
    <rect class="card-head" x="0" y="0" width="290" height="34"/>
    <rect class="card" x="0" y="34" width="290" height="108"/>
    <text x="14" y="22" class="table-title">profile_bio</text>
    <text x="14" y="56" class="table-col">PK id, FK profile_id</text>
    <text x="14" y="76" class="table-col">display_order (UQ+CHK)</text>
    <text x="14" y="96" class="table-col">content</text>
  </g>

  <!-- nav_item -->
  <g transform="translate(400,620)">
    <rect class="card-head" x="0" y="0" width="260" height="34"/>
    <rect class="card" x="0" y="34" width="260" height="108"/>
    <text x="14" y="22" class="table-title">nav_item</text>
    <text x="14" y="56" class="table-col">PK id, FK portfolio_id</text>
    <text x="14" y="76" class="table-col">anchor_id, label</text>
    <text x="14" y="96" class="table-col">display_order (UQ+CHK)</text>
  </g>

  <!-- skill_group -->
  <g transform="translate(700,620)">
    <rect class="card-head" x="0" y="0" width="270" height="34"/>
    <rect class="card" x="0" y="34" width="270" height="108"/>
    <text x="14" y="22" class="table-title">skill_group</text>
    <text x="14" y="56" class="table-col">PK id, FK portfolio_id</text>
    <text x="14" y="76" class="table-col">category</text>
    <text x="14" y="96" class="table-col">display_order (UQ+CHK)</text>
  </g>

  <!-- skill_item -->
  <g transform="translate(700,800)">
    <rect class="card-head" x="0" y="0" width="270" height="34"/>
    <rect class="card" x="0" y="34" width="270" height="108"/>
    <text x="14" y="22" class="table-title">skill_item</text>
    <text x="14" y="56" class="table-col">PK id, FK skill_group_id</text>
    <text x="14" y="76" class="table-col">name</text>
    <text x="14" y="96" class="table-col">display_order (UQ+CHK)</text>
  </g>

  <!-- project -->
  <g transform="translate(1030,320)">
    <rect class="card-head" x="0" y="0" width="310" height="34"/>
    <rect class="card" x="0" y="34" width="310" height="170"/>
    <text x="14" y="22" class="table-title">project</text>
    <text x="14" y="56" class="table-col">PK id, FK portfolio_id</text>
    <text x="14" y="76" class="table-col">title, summary</text>
    <text x="14" y="96" class="table-col">role, impact</text>
    <text x="14" y="116" class="table-col">display_order (UQ+CHK)</text>
    <text x="14" y="136" class="table-col">created_at, updated_at</text>
  </g>

  <!-- project_stack -->
  <g transform="translate(980,620)">
    <rect class="card-head" x="0" y="0" width="280" height="34"/>
    <rect class="card" x="0" y="34" width="280" height="108"/>
    <text x="14" y="22" class="table-title">project_stack</text>
    <text x="14" y="56" class="table-col">PK id, FK project_id</text>
    <text x="14" y="76" class="table-col">name</text>
    <text x="14" y="96" class="table-col">display_order (UQ+CHK)</text>
  </g>

  <!-- project_detail -->
  <g transform="translate(1280,620)">
    <rect class="card-head" x="0" y="0" width="280" height="34"/>
    <rect class="card" x="0" y="34" width="280" height="108"/>
    <text x="14" y="22" class="table-title">project_detail</text>
    <text x="14" y="56" class="table-col">PK id, FK project_id</text>
    <text x="14" y="76" class="table-col">content</text>
    <text x="14" y="96" class="table-col">display_order (UQ+CHK)</text>
  </g>

  <!-- project_link -->
  <g transform="translate(1280,800)">
    <rect class="card-head" x="0" y="0" width="280" height="34"/>
    <rect class="card" x="0" y="34" width="280" height="108"/>
    <text x="14" y="22" class="table-title">project_link</text>
    <text x="14" y="56" class="table-col">PK id, FK/UQ project_id</text>
    <text x="14" y="76" class="table-col">github_url (required)</text>
    <text x="14" y="96" class="table-col">demo_url (optional)</text>
  </g>

  <!-- experience -->
  <g transform="translate(1380,320)">
    <rect class="card-head" x="0" y="0" width="320" height="34"/>
    <rect class="card" x="0" y="34" width="320" height="150"/>
    <text x="14" y="22" class="table-title">experience</text>
    <text x="14" y="56" class="table-col">PK id, FK portfolio_id</text>
    <text x="14" y="76" class="table-col">company, position</text>
    <text x="14" y="96" class="table-col">period</text>
    <text x="14" y="116" class="table-col">display_order (UQ+CHK)</text>
  </g>

  <!-- experience_achievement -->
  <g transform="translate(1390,560)">
    <rect class="card-head" x="0" y="0" width="320" height="34"/>
    <rect class="card" x="0" y="34" width="320" height="108"/>
    <text x="14" y="22" class="table-title">experience_achievement</text>
    <text x="14" y="56" class="table-col">PK id, FK experience_id</text>
    <text x="14" y="76" class="table-col">content</text>
    <text x="14" y="96" class="table-col">display_order (UQ+CHK)</text>
  </g>

  <!-- contact -->
  <g transform="translate(1120,90)">
    <rect class="card-head" x="0" y="0" width="360" height="34"/>
    <rect class="card" x="0" y="34" width="360" height="180"/>
    <text x="14" y="22" class="table-title">contact</text>
    <text x="14" y="56" class="table-col">PK id, FK/UQ portfolio_id</text>
    <text x="14" y="76" class="table-col">email_enc/email_iv/email_tag</text>
    <text x="14" y="96" class="table-col">email_key_version, email_hash</text>
    <text x="14" y="116" class="table-col">github_url, linkedin_url</text>
    <text x="14" y="136" class="table-col">blog_url, message</text>
    <text x="14" y="156" class="table-col">created_at, updated_at</text>
  </g>

  <!-- relationships -->
  <line class="line" x1="900" y1="280" x2="500" y2="320"/>
  <text class="label" x="860" y="268">1</text>
  <text class="label" x="520" y="318">1</text>

  <line class="line" x1="1040" y1="210" x2="1120" y2="170"/>
  <text class="label" x="1054" y="204">1</text>
  <text class="label" x="1104" y="186">1</text>

  <line class="line" x1="880" y1="280" x2="530" y2="620"/>
  <text class="label" x="848" y="302">1</text>
  <text class="label" x="550" y="602">N</text>

  <line class="line" x1="920" y1="280" x2="840" y2="620"/>
  <text class="label" x="930" y="302">1</text>
  <text class="label" x="850" y="602">N</text>

  <line class="line" x1="980" y1="280" x2="1185" y2="320"/>
  <text class="label" x="986" y="272">1</text>
  <text class="label" x="1162" y="316">N</text>

  <line class="line" x1="1010" y1="260" x2="1540" y2="320"/>
  <text class="label" x="1018" y="252">1</text>
  <text class="label" x="1522" y="315">N</text>

  <line class="line" x1="370" y1="450" x2="225" y2="600"/>
  <text class="label" x="356" y="468">1</text>
  <text class="label" x="236" y="596">N</text>

  <line class="line" x1="835" y1="760" x2="835" y2="800"/>
  <text class="label" x="844" y="780">1</text>
  <text class="label" x="844" y="816">N</text>

  <line class="line" x1="1185" y1="520" x2="1110" y2="620"/>
  <text class="label" x="1172" y="540">1</text>
  <text class="label" x="1116" y="614">N</text>

  <line class="line" x1="1185" y1="520" x2="1418" y2="620"/>
  <text class="label" x="1204" y="542">1</text>
  <text class="label" x="1402" y="616">N</text>

  <line class="line" x1="1250" y1="520" x2="1420" y2="800"/>
  <text class="label" x="1266" y="542">1</text>
  <text class="label" x="1405" y="794">1</text>

  <line class="line" x1="1540" y1="504" x2="1540" y2="560"/>
  <text class="label" x="1548" y="530">1</text>
  <text class="label" x="1548" y="578">N</text>
</svg>
